<svg width="960" height="280" viewBox="0 0 960 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">At a Glance circular counters</title>
  <desc id="desc">Three circular counters showing 6 plus years, 14 plus projects, and 7 thousand plus downloads.</desc>

  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <style>
      .card { fill: url(#card); stroke: #334155; stroke-opacity: 0.4; stroke-width: 1; }
      .track { fill: none; stroke: #94A3B8; stroke-opacity: 0.2; stroke-width: 10; }
      .value-ring { fill: none; stroke: url(#ring); stroke-width: 10; stroke-linecap: round; }
      .value { fill: #F8FAFC; font-family: Arial, Helvetica, sans-serif; font-size: 26px; font-weight: 700; text-anchor: middle; }
      .label { fill: #E2E8F0; font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; text-anchor: middle; }
      .meta { fill: #94A3B8; font-family: Arial, Helvetica, sans-serif; font-size: 14px; text-anchor: middle; }
      .mono { font-family: "Courier New", Courier, monospace; }
    </style>
  </defs>

  <rect x="16" y="16" width="288" height="248" rx="24" class="card" filter="url(#shadow)"/>
  <rect x="336" y="16" width="288" height="248" rx="24" class="card" filter="url(#shadow)"/>
  <rect x="656" y="16" width="288" height="248" rx="24" class="card" filter="url(#shadow)"/>

  <circle cx="160" cy="94" r="42" class="track"/>
  <circle cx="160" cy="94" r="42" class="value-ring" stroke-dasharray="172 91.89" transform="rotate(-90 160 94)"/>
  <text x="160" y="102" class="value">6+</text>
  <text x="160" y="164" class="label">Years</text>
  <text x="160" y="190" class="meta">Production product delivery</text>

  <circle cx="480" cy="94" r="42" class="track"/>
  <circle cx="480" cy="94" r="42" class="value-ring" stroke-dasharray="214 49.89" transform="rotate(-90 480 94)"/>
  <text x="480" y="102" class="value">14+</text>
  <text x="480" y="164" class="label">Projects</text>
  <text x="480" y="190" class="meta">Mobile, tooling, games, packages</text>

  <circle cx="800" cy="94" r="42" class="track"/>
  <circle cx="800" cy="94" r="42" class="value-ring" stroke-dasharray="228 35.89" transform="rotate(-90 800 94)"/>
  <text x="800" y="102" class="value">7K+</text>
  <text x="800" y="164" class="label">Package Downloads</text>
  <text x="800" y="190" class="meta mono">liquid_glass_easy on pub.dev</text>
</svg>
